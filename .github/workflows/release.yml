name: Release
on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - name: Install TUI dependencies (all platforms)
        run: cd tui && bun install --os=* --cpu=*
      - name: Build all platform binaries
        run: cd tui && bun run build:all
      - name: Build release tarball
        run: |
          VERSION="${GITHUB_REF_NAME}"
          TARBALL="tarvos-${VERSION}.tar.gz"
          # Create a staging directory with the files the installer expects
          STAGING="tarvos-${VERSION}"
          mkdir -p "$STAGING"
          cp tarvos.sh "$STAGING/"
          cp -r lib/ "$STAGING/lib/"
          cp -r tarvos-skill/ "$STAGING/tarvos-skill/"
          tar -czf "$TARBALL" "$STAGING"
          rm -rf "$STAGING"
          echo "TARBALL=$TARBALL" >> "$GITHUB_ENV"
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            tui/dist/tui-darwin-arm64
            tui/dist/tui-darwin-x64
            tui/dist/tui-linux-x64
            tui/dist/tui-linux-arm64
            ${{ env.TARBALL }}
